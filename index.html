<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeroTrust Board</title>

  <!--
    ╔══════════════════════════════════════════════════════════════════════════╗
    ║  DRACONIAN CONTENT SECURITY POLICY                                       ║
    ║                                                                          ║
    ║  Threat model: XSS → localStorage private key exfiltration              ║
    ║                                                                          ║
    ║  script-src 'self'  — No inline scripts. No eval(). No remote JS.       ║
    ║  connect-src        — Only GitHub API + raw content. No exfil vectors.  ║
    ║  object-src 'none'  — No Flash / plugin attacks.                        ║
    ║  base-uri 'self'    — Prevents base-tag hijacking.                      ║
    ║  frame-ancestors    — Prevents clickjacking.                             ║
    ╚══════════════════════════════════════════════════════════════════════════╝
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src  'self' https://cdnjs.cloudflare.com;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src    'self' https://fonts.gstatic.com;
    connect-src 'self'
                https://api.github.com
                https://raw.githubusercontent.com
                stun:stun.l.google.com:19302
                stun:stun1.l.google.com:19302
                stun:stun.cloudflare.com:3478;
    img-src     'self' data: https:;
    media-src   'self' blob:;
    object-src  'none';
    base-uri    'self';
    form-action 'none';
    frame-ancestors 'none';
    upgrade-insecure-requests;
  " />

  <!-- X-Frame-Options as belt-and-suspenders (CSP frame-ancestors takes precedence) -->
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="Referrer-Policy" content="no-referrer" />
  <meta http-equiv="Permissions-Policy" content="
    camera=(),
    microphone=(self),
    geolocation=(),
    payment=()
  " />

  <!-- DOMPurify — XSS sanitiser. MUST load before any user content renders. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"
          integrity="sha512-jB0TkTBeQC9ZSkBqDhdmfTv1qdfbWpGE72yJ/01Srq6hEzZIz2xkz9XK3n+dW5TISmbz0463JIXMO63uf2domw=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:         #0a0a0f;
      --surface:    #111118;
      --border:     #1e1e2e;
      --accent:     #00ff9d;
      --accent-dim: #00c97a;
      --text:       #c9d1d9;
      --muted:      #484f58;
      --danger:     #ff4d4d;
      --warning:    #ffb347;
      --mono:       'IBM Plex Mono', monospace;
      --sans:       'Space Grotesk', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo::before {
      content: '◈';
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    nav { display: flex; gap: 1rem; }

    nav a {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.4rem 0.8rem;
      border: 1px solid transparent;
      border-radius: 3px;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }

    nav a:hover {
      color: var(--accent);
      border-color: var(--border);
    }

    /* ── Main ─────────────────────────────────────────────────────── */
    main {
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem;
    }

    /* ── Identity Panel ───────────────────────────────────────────── */
    .identity-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }

    .identity-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--accent);
    }

    .identity-panel h2 {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
    }

    .identity-status {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .status-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .status-dot.warning { background: var(--warning); }

    .identity-controls {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .btn {
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }

    .btn-primary {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: var(--bg); }

    /* ── Comment Form ─────────────────────────────────────────────── */
    .comment-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .comment-form h2 {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
    }

    .comment-form textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.95rem;
      padding: 0.75rem;
      border-radius: 3px;
      resize: vertical;
      min-height: 100px;
      margin-bottom: 0.75rem;
      transition: border-color 0.15s;
    }

    .comment-form textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .form-hint {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── Comments Feed ────────────────────────────────────────────── */
    .feed-header {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .comment-card {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
      background: var(--surface);
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .comment-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .comment-author {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--accent);
    }

    .comment-time {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    .comment-text {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
    }

    /* ── Call UI ──────────────────────────────────────────────────── */
    .call-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .call-panel h2 {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
    }

    .call-controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    select.user-select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.5rem;
      border-radius: 3px;
      flex: 1;
      min-width: 150px;
    }

    #call-status {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.75rem;
    }

    /* ── Toast Notifications ──────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .toast {
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.75rem 1rem;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      max-width: 320px;
      animation: toastIn 0.2s ease;
    }

    .toast.success { border-color: var(--accent); color: var(--accent); }
    .toast.error   { border-color: var(--danger); color: var(--danger); }
    .toast.warning { border-color: var(--warning); color: var(--warning); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Loading State ────────────────────────────────────────────── */
    .loading {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      padding: 2rem;
      text-align: center;
    }

    .loading::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    /* ── Modals ───────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      max-width: 480px;
      width: 90%;
    }

    .modal h3 {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .modal p {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .modal input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.6rem;
      border-radius: 3px;
      margin-bottom: 1rem;
    }

    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

    /* ── Audio element (hidden) ───────────────────────────────────── */
    #remote-audio { display: none; }

    /* ── Footer ───────────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2rem;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">ZEROTRUST BOARD</div>
    <nav>
      <a href="index.html">Feed</a>
      <a href="register.html">Register</a>
      <a href="admin.html">Admin ⬡</a>
    </nav>
  </header>

  <main>
    <!-- Identity Status -->
    <div class="identity-panel">
      <h2>// Identity</h2>
      <div class="identity-status">
        <div class="status-dot" id="identity-dot"></div>
        <span id="identity-label" style="font-family: var(--mono); font-size: 0.85rem;">
          No identity loaded
        </span>
      </div>
      <div class="identity-controls">
        <label class="btn">
          Load Key Bundle
          <input type="file" id="key-file-input" accept=".json" style="display:none" />
        </label>
        <button class="btn btn-danger" id="logout-btn" style="display:none">
          Unload Identity
        </button>
      </div>
    </div>

    <!-- P2P Call Panel -->
    <div class="call-panel" id="call-panel" style="display:none">
      <h2>// P2P Encrypted Call</h2>
      <div class="call-controls">
        <select class="user-select" id="call-user-select">
          <option value="">-- Select user to call --</option>
        </select>
        <button class="btn btn-primary" id="call-btn">Call</button>
        <button class="btn btn-danger" id="hangup-btn" style="display:none">Hang Up</button>
      </div>
      <div id="call-status">State: idle</div>
      <audio id="remote-audio" autoplay></audio>
    </div>

    <!-- Comment Submission -->
    <div class="comment-form" id="comment-form" style="display:none">
      <h2>// Submit Comment</h2>
      <textarea id="comment-input" placeholder="Your comment... (signed with your key, encrypted to admin)"></textarea>
      <div class="form-footer">
        <span class="form-hint">RSA-PSS signed · RSA-OAEP encrypted · AES-GCM sealed</span>
        <button class="btn btn-primary" id="submit-btn">Submit Encrypted</button>
      </div>
    </div>

    <!-- Comments Feed -->
    <div>
      <div class="feed-header">
        <span>◈ Public Feed</span>
        <span id="comment-count" style="margin-left:auto"></span>
      </div>
      <div id="comments-feed">
        <div class="loading">Loading comments</div>
      </div>
    </div>
  </main>

  <footer>
    Zero-Trust · E2EE · Serverless · WebRTC P2P · GitHub Pages
  </footer>

  <div id="toast-container"></div>

  <!-- Incoming call modal (rendered dynamically) -->
  <div id="modal-container"></div>

  <!-- Core modules (order matters: crypto first) -->
  <script src="js/crypto.js"></script>
  <script src="js/webrtc-signal.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
