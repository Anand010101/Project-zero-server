<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — ZeroTrust</title>

  <!-- Same draconian CSP as index.html -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src  'self' https://cdnjs.cloudflare.com;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src    'self' https://fonts.gstatic.com;
    connect-src 'self'
                https://api.github.com
                https://raw.githubusercontent.com;
    img-src     'self' data:;
    object-src  'none';
    base-uri    'self';
    form-action 'none';
    frame-ancestors 'none';
    upgrade-insecure-requests;
  " />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="Referrer-Policy" content="no-referrer" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"
          integrity="sha512-jB0TkTBeQC9ZSkBqDhdmfTv1qdfbWpGE72yJ/01Srq6hEzZIz2xkz9XK3n+dW5TISmbz0463JIXMO63uf2domw=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
      --accent: #ff6b35; --text: #c9d1d9; --muted: #484f58;
      --danger: #ff4d4d; --success: #00ff9d;
      --mono: 'IBM Plex Mono', monospace; --sans: 'Space Grotesk', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface);
    }

    .logo { font-family: var(--mono); font-size: 1rem; color: var(--accent); letter-spacing: 0.1em; }
    .session-badge {
      font-family: var(--mono); font-size: 0.7rem; padding: 0.3rem 0.8rem;
      border: 1px solid var(--border); border-radius: 3px; color: var(--muted);
    }
    .session-badge.active { border-color: var(--success); color: var(--success); }

    main { max-width: 900px; margin: 0 auto; padding: 2rem; }

    .panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 1.5rem; margin-bottom: 1.5rem;
    }

    .panel h2 {
      font-family: var(--mono); font-size: 0.75rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 1.25rem;
    }

    .unlock-area { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }

    .btn {
      font-family: var(--mono); font-size: 0.8rem; padding: 0.5rem 1rem;
      border: 1px solid var(--border); background: transparent; color: var(--text);
      cursor: pointer; border-radius: 3px; letter-spacing: 0.05em; transition: all 0.15s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { border-color: var(--accent); color: var(--accent); }
    .btn-primary:hover { background: var(--accent); color: var(--bg); }
    .btn-success { border-color: var(--success); color: var(--success); }
    .btn-success:hover { background: var(--success); color: var(--bg); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: var(--bg); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .queue-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }

    .queue-item {
      border: 1px solid var(--border); border-radius: 4px; padding: 1rem;
      margin-bottom: 0.75rem; background: var(--bg);
    }

    .queue-item-meta {
      display: flex; gap: 0.75rem; align-items: center;
      margin-bottom: 0.5rem;
    }

    .queue-sender { font-family: var(--mono); font-size: 0.8rem; color: var(--accent); }
    .queue-time   { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); }
    .queue-status { font-family: var(--mono); font-size: 0.7rem; padding: 0.2rem 0.5rem;
                    border-radius: 2px; border: 1px solid var(--border); }
    .queue-status.pending  { color: #ffb347; border-color: #ffb347; }
    .queue-status.valid    { color: var(--success); border-color: var(--success); }
    .queue-status.invalid  { color: var(--danger); border-color: var(--danger); }

    .queue-text {
      font-size: 0.9rem; line-height: 1.6; color: var(--text);
      margin: 0.5rem 0; padding: 0.5rem; background: var(--surface);
      border-radius: 3px; word-break: break-word;
    }

    .queue-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }

    .empty-state {
      font-family: var(--mono); font-size: 0.8rem; color: var(--muted);
      padding: 2rem; text-align: center;
    }

    #toast-container {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .toast {
      font-family: var(--mono); font-size: 0.8rem; padding: 0.75rem 1rem;
      border-radius: 4px; background: var(--surface); border: 1px solid var(--border);
      max-width: 320px; animation: toastIn 0.2s ease;
    }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error   { border-color: var(--danger);  color: var(--danger); }
    .toast.warning { border-color: #ffb347; color: #ffb347; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .timer-bar {
      font-family: var(--mono); font-size: 0.7rem; color: var(--muted);
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">⬡ ADMIN PANEL</div>
  <span class="session-badge" id="session-badge">SESSION LOCKED</span>
</header>

<main>
  <!-- Unlock Panel -->
  <div class="panel" id="unlock-panel">
    <h2>// Unlock Admin Session</h2>
    <p style="font-size:0.85rem; color:var(--muted); margin-bottom:1rem; line-height:1.6">
      Supply your Admin Master Private Key bundle. The hardcoded ciphertext will be decrypted
      in-memory using Web Crypto API. The PAT never appears in source code.
    </p>
    <div class="unlock-area">
      <label class="btn btn-primary">
        Load Master Key Bundle
        <input type="file" id="admin-key-input" accept=".json" style="display:none" />
      </label>
      <span id="unlock-status" style="font-family:var(--mono);font-size:0.8rem;color:var(--muted)">
        No key loaded
      </span>
    </div>
    <div class="timer-bar" id="session-timer" style="display:none"></div>
  </div>

  <!-- Moderation Queue (hidden until unlocked) -->
  <div class="panel" id="mod-panel" style="display:none">
    <div class="queue-header">
      <h2 style="margin-bottom:0">// Comment Moderation Queue</h2>
      <button class="btn" id="refresh-queue-btn">↻ Refresh</button>
    </div>
    <div id="queue-list">
      <div class="empty-state">Load session to fetch queue.</div>
    </div>
  </div>

  <!-- Danger Zone -->
  <div class="panel" id="danger-panel" style="display:none">
    <h2>// Session</h2>
    <button class="btn btn-danger" id="lock-btn">Lock Session</button>
  </div>
</main>

<div id="toast-container"></div>

<script src="js/crypto.js"></script>
<script src="js/admin.js"></script>
<script src="js/admin-ui.js"></script>
</body>
</html>
